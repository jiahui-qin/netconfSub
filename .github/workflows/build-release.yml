name: Build and Release Netconf Tool

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Docker Build and Push
  build-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Build Executables
  build-executables:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            target: node20-linux-x64
            output: netconf-tool-linux
          - os: windows-latest
            target: node20-win-x64
            output: netconf-tool-win-x64.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd backend
          npm ci

      - name: Install frontend dependencies and build
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Prepare backend with frontend assets
        run: |
          Remove-Item -Recurse -Force backend/dist -ErrorAction SilentlyContinue
          Copy-Item -Recurse -Force frontend/dist backend/dist
        if: matrix.os == 'windows-latest'

      - name: Prepare backend with frontend assets
        run: |
          rm -rf backend/dist || true
          cp -r frontend/dist backend/dist
        if: matrix.os == 'ubuntu-latest'

      - name: Install pkg
        run: npm install -g pkg

      - name: Build executable
        working-directory: ./backend
        run: pkg . --targets ${{ matrix.target }} --output ../dist/${{ matrix.output }}

      - name: Prepare release package
        run: |
          mkdir -p artifacts
          
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mkdir -p artifacts/windows
            cp dist/${{ matrix.output }} artifacts/windows/
            cp -r backend/dist artifacts/windows/
            cp scripts/run-package.bat artifacts/windows/
          elif [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            mkdir -p artifacts/linux
            cp dist/${{ matrix.output }} artifacts/linux/
            chmod +x artifacts/linux/${{ matrix.output }}
            cp -r backend/dist artifacts/linux/
          fi
        shell: bash

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: netconf-tool-${{ matrix.os == 'ubuntu-latest' && 'linux' || 'windows' }}
          path: artifacts/
          retention-days: 90

  # Create GitHub Release (only on tags)
  create-release:
    needs: [build-docker, build-executables]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            netconf-tool-windows/*
            netconf-tool-linux/*
          draft: false
          prerelease: false
          generate_release_notes: true
