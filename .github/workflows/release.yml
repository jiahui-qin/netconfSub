name: Build and Release Netconf Tool

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Install dependencies (root)
        run: npm ci

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Prepare backend with frontend assets
        run: |
          rm -rf backend/dist || true
          cp -r frontend/dist backend/

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install pkg
        run: npm install -g pkg

      - name: Build executable files
        working-directory: ./backend
        run: |
          npm run pkg:win-x64 || true
          npm run pkg:linux || true

      - name: Prepare release artifacts
        run: |
          mkdir -p artifacts
          # Prepare Windows release package
          mkdir -p artifacts/netconf-tool-windows
          if [ -f "dist/netconf-tool-win-x64.exe" ]; then
            cp dist/netconf-tool-win-x64.exe artifacts/netconf-tool-windows/
            cp -r backend/dist artifacts/netconf-tool-windows/
            cp scripts/run-package.bat artifacts/netconf-tool-windows/
            echo '@echo off' > artifacts/netconf-tool-windows/快速开始.bat
            echo echo Netconf Tool - 快速开始 >> artifacts/netconf-tool-windows/快速开始.bat
            echo echo. >> artifacts/netconf-tool-windows/快速开始.bat
            echo echo 请按任意键启动 Netconf Tool... >> artifacts/netconf-tool-windows/快速开始.bat
            echo pause ^>nul >> artifacts/netconf-tool-windows/快速开始.bat
            echo call run-package.bat >> artifacts/netconf-tool-windows/快速开始.bat
          fi
          
          # Prepare Linux release package
          mkdir -p artifacts/netconf-tool-linux
          if [ -f "dist/netconf-tool-linux" ]; then
            cp dist/netconf-tool-linux artifacts/netconf-tool-linux/
            chmod +x artifacts/netconf-tool-linux/netconf-tool-linux
            cp -r backend/dist artifacts/netconf-tool-linux/
          fi
          
          # Copy documentation
          cp README.md artifacts/
          mkdir -p artifacts/docs
          cp docs/WINDOWS-GUIDE.md artifacts/docs/ || true

      - name: Archive release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: artifacts/
          retention-days: 90

      - name: Upload to GitHub Packages (Executables)
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            artifacts/netconf-tool-windows/*.exe
            artifacts/netconf-tool-linux/netconf-tool-linux
            artifacts/README.md
          draft: false
          prerelease: false
